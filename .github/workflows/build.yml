name: "Build and release artifacts"

on:
  pull_request:
    branches:
      - "main"
  release:
    types:
      - created
  workflow_dispatch:

env:
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE: kaia-writer
  DOCKERFILE: Dockerfile.debank

jobs:
  build-artifacts:
    strategy:
      matrix:
        arch: [ amd64, arm64 ]
    runs-on: [self-hosted, "${{ matrix.arch }}"]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: tibdex/github-app-token@v1
        id: generate-token
        with:
          app_id: ${{ secrets.RELEASE_MANAGER_APP_ID }}
          private_key: ${{ secrets.RELEASE_MANAGER_APP_SECRET }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set env
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          else
            echo "REVISION=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
          fi

      - name: Build and push image
        run: |
          DOCKER_BUILDKIT=1 docker build --build-arg ACCESS_TOKEN=${{ steps.generate-token.outputs.token }} -t ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION} -f ${DOCKERFILE} .
          docker push ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION}
          docker run --name dryrun --rm ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION} ken version
          docker rmi ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION}

      - name: Lark Notification
        continue-on-error: true
        run: |
          notiv3 "Blockchain klaytn latest image pushed 🎉" ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION}

  merge-docker-manifest:
    runs-on: [self-hosted, general]
    needs: build-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set env
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          else
            echo "REVISION=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
          fi

      - name: Merge manifest
        run: |
          docker pull --platform=linux/amd64 ${REGISTRY}/${IMAGE}:amd64-${REVISION}
          docker pull --platform=linux/arm64 ${REGISTRY}/${IMAGE}:arm64-${REVISION}
          docker buildx imagetools create --tag ${REGISTRY}/${IMAGE}:${REVISION} ${REGISTRY}/${IMAGE}:amd64-${REVISION} ${REGISTRY}/${IMAGE}:arm64-${REVISION}
          docker run --name dryrun --rm ${REGISTRY}/${IMAGE}:${REVISION} ken version
          docker rmi ${REGISTRY}/${IMAGE}:${REVISION}
          docker rmi ${REGISTRY}/${IMAGE}:amd64-${REVISION}
          docker rmi ${REGISTRY}/${IMAGE}:arm64-${REVISION}

      # - name: Lark Notification
      #   continue-on-error: true
      #   run: |
      #     notiv3 "Blockchain klaytn latest image pushed 🎉" ${REGISTRY}/${IMAGE}:${REVISION}
